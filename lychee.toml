# Shared Lychee link checker config for Solo docs sites
# https://lychee.cli.rs/guides/config/

exclude = [
  # Static assets
  "#.*",
  ".*apple-touch-icon.*",
  ".*favicon.*",
  ".*\\.json",
  ".*site\\.webmanifest.*",
  ".*style\\.min\\..*",

  # Example/placeholder URLs
  ".*example\\.(com|org)",
  ".*another\\.(com|org)",
  "https?://example\\.com.*",
  "https?://localhost.*",

  # CI build paths (Hugo sometimes embeds workspace paths in asset URLs)
  # Only excludes http(s) URLs — file:// URLs are lychee's local link resolution and should be checked
  "https?://[^/]+/home/runner/",

  # Internal ports commonly used in docs examples (Vault, Envoy admin, etc.)
  ".*:8200.*",
  ".*:9080.*",

  # Internal/private hostnames
  ".*127\\..*",
  ".*cluster\\.local.*",
  ".*prometheus-server.*",

  # Example config values (not real URLs)
  "https?://istiod.istio-system.svc:15012",
  "https?://thanos-querier\\.openshift-monitoring\\.svc[^/]*",

  # External services that block or rate-limit link checkers
  ".*app\\.excalidraw.*",
  ".*management\\.azure\\.com.*",
  ".*storage\\.googleapis.*",
  ".*twitter\\.com/soloio_inc.*",
  "https?://aistudio.google.com/app/apikey",
  "https?://console.mistral.ai/",
  "https?://slack.solo.io/",
  "https://www.linkedin.com/company/agent-gateway",
  "https://www.linkedin.com/company/kagent/",

  # Open Source Attribution: Go module URLs (pkg.go.dev), not HTTP docs
  "https?://istio\\.io/(api|client-go|istio)",
  "https?://k8s\\.io/",

  # Istio release index (valid but often timeouts or rate-limits in CI)
  "https?://istio\\.io/latest/news/releases/?$",

  # Gloo Mesh (OSS) version switcher links to Gloo Mesh Enterprise docs; expected cross-product links
  ".*gloo-mesh-enterprise/.*",
  "https?://docs\\.solo\\.io/gloo-mesh-enterprise/",

  # Specific URLs excluded by content team
  ".*articles/4414409064596.*",
]



exclude_path = [
  ".*categories/index.html",
  ".*tags/index.html",
]

# Exclude all private IPs (localhost, 127.0.0.1, etc.)
exclude_all_private = true

# Accepted HTTP status codes (3xx not included - redirects will be reported)
accept = ["100..=103", "200..=299", "403"]

include_fragments = true

verbose = "debug"

no_progress = true

timeout = 30
